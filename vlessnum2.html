<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Текстовый Нумератор с Подсветкой</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 20px auto; padding: 20px; background-color: #f0f2f5; }
        .container { display: flex; flex-direction: column; gap: 15px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        textarea, .output-display { 
            width: 100%; height: 200px; padding: 12px; border: 2px solid #e0e0e0; 
            border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px;
            box-sizing: border-box; overflow-y: auto;
        }

        .output-display { background: #fafafa; white-space: pre-wrap; outline: none; }
        
        /* Стиль подсветки */
        mark { background-color: #ffeb3b; color: #d32f2f; font-weight: bold; border-radius: 3px; padding: 0 2px; }

        .controls { display: flex; gap: 10px; align-items: center; margin: 10px 0; }
        input[type="text"] { padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; flex-grow: 1; }
        
        button { padding: 10px 25px; cursor: pointer; border: none; border-radius: 8px; font-weight: 600; transition: 0.2s; }
        .btn-run { background-color: #4CAF50; color: white; }
        .btn-run:hover { background-color: #43a047; }
        .btn-copy { background-color: #2196F3; color: white; margin-top: 10px; }
        .btn-copy:hover { background-color: #1e88e5; }
        
        label { font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <div class="container">
        <label>Исходный текст:</label>
        <textarea id="inputBox" placeholder="Вставьте ваш текст здесь..."></textarea>

        <div class="controls">
            <input type="text" id="pattern" placeholder="Символы для поиска (с конца строки)">
            <button class="btn-run" onclick="processText()">Обработать</button>
        </div>

        <label>Результат (подсветка добавлена визуально):</label>
        <div id="outputBox" class="output-display" contenteditable="true"></div>

        <button class="btn-copy" onclick="copyToClipboard()">Копировать чистый текст</button>
    </div>

    <script>
        function processText() {
            const input = document.getElementById('inputBox').value;
            const searchStr = document.getElementById('pattern').value;
            const outputDiv = document.getElementById('outputBox');
            
            if (!searchStr) {
                alert("Введите символы для поиска!");
                return;
            }

            const lines = input.split('\n');
            const processedHTML = lines.map((line, index) => {
                const lastIdx = line.lastIndexOf(searchStr);
                
                if (lastIdx === -1) return escapeHtml(line);

                const counter = (index + 1).toString().padStart(2, '0') + "-";
                
                const before = line.substring(0, lastIdx + searchStr.length);
                const after = line.substring(lastIdx + searchStr.length);
                
                // Оборачиваем счетчик в тег <mark> для подсветки
                return escapeHtml(before) + "<mark>" + counter + "</mark>" + escapeHtml(after);
            });

            outputDiv.innerHTML = processedHTML.join('\n');
        }

        // Функция для безопасного вывода текста (чтобы скрипты в тексте не сработали)
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyToClipboard() {
            const outputDiv = document.getElementById('outputBox');
            // Используем .innerText, чтобы получить только текст без HTML тегов <mark>
            const textToCopy = outputDiv.innerText;

            if (!textToCopy) return;

            navigator.clipboard.writeText(textToCopy).then(() => {
                alert("Текст скопирован (без подсветки, только символы)!");
            }).catch(err => {
                console.error('Ошибка при копировании: ', err);
            });
        }
    </script>

</body>
</html>
