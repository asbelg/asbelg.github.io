<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Навигация</title>
    <style>
        /* Сброс базовых отступов и настройка шрифта */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Контейнер для меню */
        .menu-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .menu-title {
            margin-bottom: 20px;
            color: #333333;
            font-size: 1.5rem;
        }

        /* Стилизация кнопок */
        .menu-button {
            display: block;
            width: 100%;
            padding: 14px 20px;
            margin-bottom: 12px;
            background-color: #0A457A;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            text-decoration: none; /* Если решите заменить на тег <a> */
        }

        /* Последняя кнопка без нижнего отступа */
        .menu-button:last-child {
            margin-bottom: 0;
        }

        /* Эффект при наведении (Hover) */
        .menu-button:hover {
            background-color: #2962AB ;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.3);
        }

        /* Эффект при нажатии (Active) */
        .menu-button:active {
            transform: translateY(0);
            box-shadow: none;
        }

        /* Пример акцентной кнопки (например, для выхода или важного действия) */
        .menu-button.danger {
            background-color: #dc3545;
        }

        .menu-button.danger:hover {
            background-color: #bd2130;
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
        }
    </style>
</head>
<body>

    <div class="menu-container">
        <h2 class="menu-title">Навигация</h2>
        
        <a href="https://asbelg.github.io/today.html" target="_blank"><button class="menu-button">Расписание заседаний</button>
		<button class="menu-button" onclick="alert('Переход в Личный кабинет')">Расписание ВКС</button>

    </div>

</body>
</html>
